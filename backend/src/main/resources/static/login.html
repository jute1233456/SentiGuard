<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SentiGuard - 登录</title>
  <style>
    /* ===== Design System (aligned with dashboard/opinion) ===== */
    :root {
      --bg: #0a0a10; --surface: rgba(18,18,30,0.88); --text: #e4e4ec; --text-secondary: #8888a2;
      --muted: #8888a2; --border: rgba(255,255,255,0.08); --border-light: rgba(255,255,255,0.04);
      --accent: #2dd4bf; --accent-gradient: linear-gradient(135deg, #2dd4bf, #14b8a6);
      --accent-soft: rgba(45,212,191,0.10); --accent-glow: rgba(45,212,191,0.25);
      --good: #4ade80; --good-bg: rgba(74,222,128,0.12);
      --bad: #f87171; --bad-bg: rgba(248,113,113,0.12);
      --shadow-lg: 0 24px 56px rgba(0,0,0,0.45);
      --radius: 10px; --radius-sm: 6px;
      --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f0f2f5; --surface: rgba(255,255,255,0.92); --text: #1a1a2e; --text-secondary: #5a6178;
        --muted: #8b92a8; --border: rgba(0,0,0,0.08); --border-light: rgba(0,0,0,0.04);
        --accent: #4361ee; --accent-gradient: linear-gradient(135deg, #4361ee, #3a0ca3);
        --accent-soft: rgba(67,97,238,0.08); --accent-glow: rgba(67,97,238,0.18);
        --good: #2d6a4f; --good-bg: #d8f3dc;
        --bad: #9b2226; --bad-bg: #f8d7da;
        --shadow-lg: 0 24px 56px rgba(21,38,55,0.12);
      }
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;display:grid;place-items:center;
      font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;
      color:var(--text);background-color:var(--bg);
      background-image:radial-gradient(rgba(128,128,128,0.08) 0.7px,transparent 0.7px);
      background-size:28px 28px;overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
    }

    /* Background quotes */
    .quotes-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
    .bg-quote{position:absolute;font-family:Georgia,"Times New Roman",serif;font-style:italic;color:var(--muted);opacity:0.12;user-select:none;white-space:nowrap}
    @keyframes breathe-quote{0%,40%{opacity:0.28}50%,90%{opacity:0.03}100%{opacity:0.28}}
    #q-main{top:6%;left:5%;font-size:clamp(2.4rem,5.5vw,5rem);animation:breathe-quote 8s ease-in-out 0s infinite}
    #q-define{top:25%;right:4%;font-size:clamp(1.6rem,3.8vw,3.5rem);animation:breathe-quote 8s ease-in-out 2s infinite}
    #q-free{top:52%;left:3%;font-size:clamp(1.1rem,2.8vw,2rem);animation:breathe-quote 8s ease-in-out 4s infinite}
    #q-spoon{bottom:28%;right:6%;font-size:clamp(0.9rem,2vw,1.4rem);animation:breathe-quote 8s ease-in-out 6s infinite}

    /* Orbs */
    .bg-orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
    .orb-1{width:500px;height:500px;background:rgba(45,212,191,0.04);top:-15%;right:-10%}
    .orb-2{width:350px;height:350px;background:rgba(67,97,238,0.03);bottom:-12%;left:-8%}

    /* Card */
    .card{position:relative;z-index:1;width:min(420px,92vw);background:var(--surface);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--radius);padding:40px 34px 32px;box-shadow:0 0 0 1px rgba(255,255,255,0.03) inset,var(--shadow-lg);transition:box-shadow var(--transition)}
    .card:hover{box-shadow:0 0 0 1px rgba(255,255,255,0.04) inset,0 28px 64px rgba(0,0,0,0.55),0 0 60px var(--accent-glow)}
    .card::before{content:'';position:absolute;top:0;left:20px;right:20px;height:1.5px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.5;border-radius:1px}

    /* Brand */
    .brand{text-align:center;margin-bottom:28px}
    .brand-icon{width:46px;height:46px;margin:0 auto 14px;display:grid;place-items:center;border-radius:10px;background:var(--accent-gradient);color:#0a0a10;font-size:20px;font-weight:900;box-shadow:0 8px 24px var(--accent-glow);position:relative}
    .brand-icon::after{content:'';position:absolute;inset:-4px;border-radius:14px;background:transparent;border:1.5px solid var(--accent);opacity:0.2;animation:iconPulse 3s ease-in-out infinite}
    @keyframes iconPulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.7;transform:scale(1.06)}}
    .brand h2{font-size:22px;font-weight:800;letter-spacing:0.5px;color:var(--text);margin-bottom:4px}
    .brand .sub{font-size:13px;color:var(--muted);letter-spacing:1px}

    /* Tabs */
    .tabs{display:grid;grid-template-columns:1fr 1fr;position:relative;margin-bottom:26px;border-bottom:1px solid var(--border)}
    .tabs::after{content:'';position:absolute;bottom:-1px;left:0;width:50%;height:2px;background:var(--accent);border-radius:1px;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);transform:translateX(0)}
    .tabs.register::after{transform:translateX(100%)}
    .tab{padding:10px 0;text-align:center;font-size:14px;font-weight:700;background:none;border:0;cursor:pointer;color:var(--muted);transition:color var(--transition);letter-spacing:1px;position:relative;z-index:1}
    .tab:hover{color:var(--text-secondary)}
    .tab.active{color:var(--accent)}

    /* Form */
    .form{display:grid;gap:18px}
    .form.hidden{display:none}
    .field{display:grid;gap:6px;position:relative}
    .field label{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:0.5px;transition:color var(--transition)}
    .field:focus-within label{color:var(--accent)}
    .input-wrap{position:relative;display:flex;align-items:center}
    .input-wrap .input-icon{position:absolute;left:13px;width:16px;height:16px;pointer-events:none;color:var(--muted);opacity:0.55;transition:opacity var(--transition),color var(--transition)}
    .field:focus-within .input-icon{opacity:1;color:var(--accent)}
    .input-wrap input{width:100%;height:44px;padding:0 40px 0 40px;background:var(--border-light);border:1px solid var(--border);border-radius:var(--radius-sm);font:inherit;font-size:14px;color:var(--text);outline:none;transition:all var(--transition)}
    .field:not(.has-password-toggle) .input-wrap input{padding-right:14px}
    .input-wrap input::placeholder{color:var(--muted);opacity:0.4}
    .input-wrap input:focus{border-color:var(--accent);background:rgba(255,255,255,0.07);box-shadow:0 0 0 3px var(--accent-soft)}
    .field.error input{border-color:var(--bad);box-shadow:0 0 0 3px var(--bad-bg)}
    .field.error label{color:var(--bad)}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}
    .field.error .input-wrap{animation:shake 0.4s ease}

    /* Password toggle */
    .toggle-pw{position:absolute;right:4px;width:34px;height:34px;display:grid;place-items:center;background:none;border:0;cursor:pointer;opacity:0.3;transition:opacity var(--transition);border-radius:4px}
    .toggle-pw:hover{opacity:0.7}
    .toggle-pw svg{width:18px;height:18px;stroke:var(--text);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

    /* Buttons */
    .btn{width:100%;height:44px;margin-top:2px;border:0;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a10;font-size:15px;font-weight:800;letter-spacing:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all var(--transition);position:relative;overflow:hidden}
    .btn:hover{filter:brightness(1.1);box-shadow:0 8px 28px var(--accent-glow);transform:translateY(-1px)}
    .btn:active{transform:translateY(0);box-shadow:0 4px 12px var(--accent-glow)}
    .btn:disabled{opacity:0.7;cursor:wait;transform:none;box-shadow:none}
    .btn-spinner{display:none;width:18px;height:18px;border:2px solid rgba(10,10,16,0.3);border-top-color:#0a0a10;border-radius:50%;animation:spin 0.6s linear infinite}
    .btn.loading .btn-spinner{display:inline-block}
    .btn.loading .btn-text{opacity:0.6}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Toast */
    .toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-12px);max-width:400px;padding:12px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;z-index:100;opacity:0;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);pointer-events:none;backdrop-filter:blur(12px);letter-spacing:0.3px;box-shadow:0 12px 32px rgba(0,0,0,0.4)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.error{background:rgba(248,113,113,0.92);color:#fff}
    .toast.success{background:rgba(45,212,191,0.92);color:#0a0a10}

    /* Footer */
    .footer-line{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--muted);opacity:0.3;letter-spacing:1px;z-index:0;pointer-events:none}

    @media(max-width:480px){
      .card{padding:30px 22px 24px}
      #q-main{font-size:1.5rem;top:4%;left:3%}
      #q-define{font-size:1.1rem;top:16%;right:3%}
      #q-free{font-size:0.85rem;left:3%}
      #q-spoon{font-size:0.7rem;bottom:32%;right:4%}
    }
  </style>
</head>
<body>
  <div class="quotes-bg">
    <span class="bg-quote" id="q-main">What is real?</span>
    <span class="bg-quote" id="q-define">How do you define real?</span>
    <span class="bg-quote" id="q-free">Free your mind.</span>
    <span class="bg-quote" id="q-spoon">There is no spoon.</span>
  </div>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="card">
    <div class="brand">
      <div class="brand-icon">SG</div>
      <h2>SentiGuard</h2>
      <div class="sub">舆情监测与事实核查平台</div>
    </div>

    <div class="tabs" id="tabBar">
      <button id="tabLogin" class="tab active" type="button">登 录</button>
      <button id="tabRegister" class="tab" type="button">注 册</button>
    </div>

    <form id="loginForm" class="form">
      <div class="field">
        <label for="loginUser">用户名</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input id="loginUser" required autocomplete="username" placeholder="请输入用户名">
        </div>
      </div>
      <div class="field has-password-toggle">
        <label for="loginPass">密码</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input id="loginPass" type="password" required autocomplete="current-password" placeholder="请输入密码">
          <button class="toggle-pw" type="button" tabindex="-1" aria-label="显示密码" data-target="loginPass">
            <svg class="eye-off" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="m14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            <svg class="eye-on" viewBox="0 0 24 24" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button id="loginBtn" class="btn" type="submit"><span class="btn-text">登 录</span><span class="btn-spinner"></span></button>
    </form>

    <form id="registerForm" class="form hidden">
      <div class="field">
        <label for="regUser">用户名</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input id="regUser" required autocomplete="username" placeholder="3-32位字母数字组合" minlength="3" maxlength="32">
        </div>
      </div>
      <div class="field">
        <label for="regNick">昵称（可选）</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input id="regNick" placeholder="显示名称">
        </div>
      </div>
      <div class="field has-password-toggle">
        <label for="regPass">密码</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input id="regPass" type="password" required autocomplete="new-password" placeholder="至少6位" minlength="6">
          <button class="toggle-pw" type="button" tabindex="-1" aria-label="显示密码" data-target="regPass">
            <svg class="eye-off" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="m14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            <svg class="eye-on" viewBox="0 0 24 24" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button id="registerBtn" class="btn" type="submit"><span class="btn-text">注 册</span><span class="btn-spinner"></span></button>
    </form>
  </div>

  <div id="toast" class="toast"></div>
  <div class="footer-line">TRUTH · TRUST · TRANSPARENCY</div>

  <script>
    var el={
      tabBar:document.getElementById('tabBar'),tabLogin:document.getElementById('tabLogin'),tabRegister:document.getElementById('tabRegister'),
      loginForm:document.getElementById('loginForm'),registerForm:document.getElementById('registerForm'),
      loginUser:document.getElementById('loginUser'),loginPass:document.getElementById('loginPass'),
      regUser:document.getElementById('regUser'),regNick:document.getElementById('regNick'),regPass:document.getElementById('regPass'),
      loginBtn:document.getElementById('loginBtn'),registerBtn:document.getElementById('registerBtn'),
      toast:document.getElementById('toast')
    };
    if(localStorage.getItem('sg_token')){window.location.href='/'}
    function showToast(msg,type){el.toast.textContent=msg;el.toast.className='toast show '+(type||'');clearTimeout(el.toast._timer);el.toast._timer=setTimeout(function(){el.toast.className='toast'},3200)}
    function saveAuth(data){localStorage.setItem('sg_token',data.token);localStorage.setItem('sg_token_type',data.tokenType);localStorage.setItem('sg_user_id',data.userId);localStorage.setItem('sg_username',data.username);localStorage.setItem('sg_nickname',data.nickname||data.username)}
    function setBtnLoading(btn,loading){if(loading){btn.classList.add('loading');btn.disabled=true}else{btn.classList.remove('loading');btn.disabled=false}}
    async function login(e){e.preventDefault();
      if(!el.loginUser.value.trim()){showToast('请输入用户名','error');return}
      if(!el.loginPass.value){showToast('请输入密码','error');return}
      setBtnLoading(el.loginBtn,true);
      try{var resp=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:el.loginUser.value.trim(),password:el.loginPass.value})});var data=await resp.json();
        if(data.code===200){saveAuth(data.data);showToast('登录成功，正在跳转…','success');setTimeout(function(){window.location.href='/'},600)}else{showToast(data.message||'登录失败','error')}
      }catch(err){showToast('网络错误：'+err.message,'error')}finally{setBtnLoading(el.loginBtn,false)}}
    async function register(e){e.preventDefault();
      var username=el.regUser.value.trim();if(!username){showToast('请输入用户名','error');return}if(username.length<3){showToast('用户名至少3位','error');return}if(!el.regPass.value||el.regPass.value.length<6){showToast('密码至少6位','error');return}
      setBtnLoading(el.registerBtn,true);
      try{var resp=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username,password:el.regPass.value,nickname:el.regNick.value.trim()||undefined})});var data=await resp.json();
        if(data.code===200){saveAuth(data.data);showToast('注册成功，正在跳转…','success');setTimeout(function(){window.location.href='/'},600)}else{showToast(data.message||'注册失败','error')}
      }catch(err){showToast('网络错误：'+err.message,'error')}finally{setBtnLoading(el.registerBtn,false)}}
    function switchTab(active){
      if(active==='login'){el.tabLogin.classList.add('active');el.tabRegister.classList.remove('active');el.loginForm.classList.remove('hidden');el.registerForm.classList.add('hidden');el.tabBar.classList.remove('register')}
      else{el.tabRegister.classList.add('active');el.tabLogin.classList.remove('active');el.registerForm.classList.remove('hidden');el.loginForm.classList.add('hidden');el.tabBar.classList.add('register')}}
    el.tabLogin.addEventListener('click',function(){switchTab('login')});el.tabRegister.addEventListener('click',function(){switchTab('register')});
    document.querySelectorAll('.toggle-pw').forEach(function(btn){btn.addEventListener('click',function(){var input=document.getElementById(btn.dataset.target);var eyeOff=btn.querySelector('.eye-off');var eyeOn=btn.querySelector('.eye-on');if(input.type==='password'){input.type='text';eyeOff.style.display='none';eyeOn.style.display=''}else{input.type='password';eyeOff.style.display='';eyeOn.style.display='none'}})});
    el.loginForm.addEventListener('submit',login);el.registerForm.addEventListener('submit',register);
  </script>
</body>
</html>
