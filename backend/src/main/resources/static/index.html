<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SentiGuard - 事实核查</title>
  <style>
    :root {
      --bg: #edf2f6;
      --surface: #ffffff;
      --surface-soft: #f7fafc;
      --ink: #172331;
      --muted: #647386;
      --line: #d7e1ea;
      --line-strong: #bfd0dd;
      --nav: #243545;
      --nav-dark: #192938;
      --blue: #1f78b5;
      --blue-dark: #145986;
      --blue-soft: #e6f2fb;
      --teal: #0f8177;
      --teal-soft: #e0f5f2;
      --green: #158147;
      --green-soft: #ddf5e7;
      --red: #c93a3a;
      --red-soft: #fde8e8;
      --amber: #a65f00;
      --amber-soft: #fff0cc;
      --shadow: 0 18px 38px rgba(21, 38, 55, 0.09);
      --shadow-soft: 0 10px 22px rgba(21, 38, 55, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--bg);
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
    }

    .sidebar {
      background: var(--nav);
      color: #dbe7f0;
      border-right: 1px solid #182635;
    }

    .brand {
      height: 82px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 22px;
      background: var(--nav-dark);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      color: #102a3b;
      background: #f3c84b;
      font-weight: 900;
    }

    .brand-name {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.1;
    }

    .brand-desc {
      margin-top: 4px;
      color: #9eb0bf;
      font-size: 12px;
    }

    .nav-block {
      padding: 18px 14px 8px;
    }

    .nav-title {
      padding: 0 10px 9px;
      color: #91a5b6;
      font-size: 12px;
      font-weight: 900;
    }

    .nav-item {
      width: 100%;
      min-height: 44px;
      display: grid;
      grid-template-columns: 24px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      border-radius: 6px;
      background: transparent;
      color: #dbe7f0;
      text-align: left;
      font-weight: 900;
    }

    .nav-item + .nav-item {
      margin-top: 5px;
    }

    .nav-item.active {
      background: var(--blue);
      color: #ffffff;
    }

    .nav-item.disabled {
      color: #8fa3b4;
      cursor: default;
    }

    .badge {
      min-width: 42px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      border-radius: 999px;
      color: #566a7d;
      background: #e5edf4;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.live {
      color: #0a5b3b;
      background: #cfeedd;
    }

    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: 66px minmax(0, 1fr);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 28px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }

    .crumb {
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .system-state {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pill {
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 12px;
      border-radius: 999px;
      color: var(--green);
      background: var(--green-soft);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .pill.error {
      color: var(--red);
      background: var(--red-soft);
    }

    .content {
      min-width: 0;
      padding: 24px 28px 36px;
      overflow: auto;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }

    .eyebrow {
      margin-bottom: 8px;
      color: var(--blue-dark);
      font-size: 13px;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: 31px;
      letter-spacing: 0;
    }

    .hero-desc {
      max-width: 850px;
      margin-top: 9px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      height: 40px;
      min-width: 104px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 15px;
      border-radius: 6px;
      color: #ffffff;
      background: var(--blue);
      font-weight: 900;
    }

    .btn.secondary {
      color: #24475f;
      background: #dfeaf2;
    }

    .btn.ghost {
      color: #24475f;
      background: #ffffff;
      border: 1px solid var(--line);
    }

    .btn:disabled {
      opacity: 0.66;
      cursor: wait;
    }

    .overview {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .metric,
    .panel,
    .notice {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow-soft);
    }

    .metric {
      min-height: 92px;
      padding: 15px 17px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .metric-value {
      margin-top: 7px;
      color: #14344d;
      font-size: 25px;
      font-weight: 900;
    }

    .metric-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(370px, 0.86fr) minmax(0, 1.14fr);
      gap: 16px;
      align-items: start;
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    .panel {
      box-shadow: var(--shadow);
    }

    .panel-head {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      color: var(--blue-dark);
      font-size: 17px;
      font-weight: 900;
    }

    .panel-sub {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .panel-body {
      padding: 18px;
    }

    .form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: #3f5367;
      font-size: 13px;
      font-weight: 900;
    }

    textarea,
    input {
      width: 100%;
      border: 1px solid #ccd8e4;
      border-radius: 6px;
      color: var(--ink);
      background: #ffffff;
      outline: none;
    }

    textarea {
      min-height: 214px;
      padding: 13px 14px;
      resize: vertical;
      line-height: 1.75;
    }

    input {
      height: 40px;
      padding: 0 12px;
    }

    textarea:focus,
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(31, 120, 181, 0.12);
    }

    .form-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 126px;
      gap: 10px;
      align-items: end;
    }

    .source-switch {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .source-card {
      min-height: 58px;
      padding: 9px 10px;
      border: 1px solid #d6e1ea;
      border-radius: 7px;
      background: var(--surface-soft);
      color: #30495e;
      text-align: left;
    }

    .source-card.active {
      border-color: var(--blue);
      background: var(--blue-soft);
    }

    .source-card strong {
      display: block;
      font-size: 13px;
      line-height: 1.4;
    }

    .source-card span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .notice {
      padding: 14px 15px;
      color: #4c6275;
      background: #f8fbfd;
      line-height: 1.75;
      font-size: 13px;
    }

    .link-grid {
      display: grid;
      gap: 10px;
    }

    .link-row {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 11px;
      align-items: start;
      padding: 12px;
      border: 1px solid #e0e8ef;
      border-radius: 7px;
      background: #f8fbfd;
    }

    .link-icon {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #ffffff;
      background: var(--teal);
      font-weight: 900;
    }

    .link-title {
      font-weight: 900;
      line-height: 1.5;
    }

    .link-desc {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .empty {
      min-height: 220px;
      display: grid;
      place-items: center;
      padding: 22px;
      border: 1px dashed #c4d3df;
      border-radius: 8px;
      color: var(--muted);
      background: #f8fbfd;
      text-align: center;
      line-height: 1.8;
    }

    .result-hero {
      border: 1px solid #dce7ef;
      border-radius: 8px;
      background: #f8fbfd;
      overflow: hidden;
    }

    .result-band {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 17px 18px;
      background: #ffffff;
      border-bottom: 1px solid #dce7ef;
    }

    .tag {
      min-width: 74px;
      height: 31px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 11px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .tag.true,
    .tag.support,
    .tag.supported,
    .tag.success {
      color: var(--green);
      background: var(--green-soft);
    }

    .tag.false,
    .tag.attack,
    .tag.not_supported,
    .tag.failed {
      color: var(--red);
      background: var(--red-soft);
    }

    .tag.partly_true,
    .tag.partly_supported,
    .tag.insufficient_evidence,
    .tag.neutral,
    .tag.running,
    .tag.pending {
      color: var(--amber);
      background: var(--amber-soft);
    }

    .conclusion {
      font-size: 22px;
      line-height: 1.55;
      font-weight: 900;
    }

    .analysis {
      padding: 16px 18px 18px;
      color: #35495d;
      line-height: 1.85;
      font-size: 14px;
    }

    .section-title {
      margin: 18px 0 10px;
      color: #18354d;
      font-size: 15px;
      font-weight: 900;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .claim,
    .evidence {
      border: 1px solid #dfe8ef;
      border-left: 4px solid var(--blue);
      border-radius: 7px;
      background: #f8fbfd;
      padding: 13px 14px;
    }

    .claim {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: 12px;
      align-items: start;
    }

    .claim-no {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #ffffff;
      background: var(--blue);
      font-size: 13px;
      font-weight: 900;
    }

    .claim-text,
    .evidence-title {
      font-weight: 900;
      line-height: 1.6;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .evidence-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 7px;
    }

    .evidence-content,
    .report-content {
      color: #35495d;
      line-height: 1.85;
      font-size: 14px;
    }

    .evidence-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .evidence-meta a {
      color: var(--blue-dark);
      text-decoration: none;
      font-weight: 900;
    }

    .report-content {
      white-space: pre-wrap;
      padding: 16px;
      border: 1px solid #dce7ef;
      border-radius: 8px;
      background: #f8fbfd;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      max-width: 420px;
      min-width: 260px;
      padding: 13px 15px;
      border-radius: 8px;
      color: #ffffff;
      background: #1f2937;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: 0.2s ease;
      z-index: 30;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      background: var(--red);
    }

    /* Visual polish for the fact-checking workspace */
    body {
      background:
        linear-gradient(180deg, #f5f8fb 0%, #eef4f7 48%, #f7f9fb 100%),
        repeating-linear-gradient(90deg, rgba(28, 63, 84, 0.035) 0 1px, transparent 1px 36px);
    }

    .sidebar {
      background: linear-gradient(180deg, #183044 0%, #203847 52%, #162836 100%);
      box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.05);
    }

    .brand {
      height: 88px;
      background: rgba(10, 24, 36, 0.42);
      backdrop-filter: blur(10px);
    }

    .brand-mark {
      color: #163044;
      background: linear-gradient(135deg, #ffe083 0%, #7bd8c5 100%);
      box-shadow: 0 10px 26px rgba(2, 18, 32, 0.26);
    }

    .brand-name {
      letter-spacing: 0;
    }

    .nav-title {
      letter-spacing: 0;
      text-transform: none;
    }

    .nav-item {
      position: relative;
      overflow: hidden;
      border: 1px solid transparent;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.08);
      transform: translateX(2px);
    }

    .nav-item.active {
      background: linear-gradient(135deg, #1f78b5 0%, #16a085 100%);
      box-shadow: 0 12px 28px rgba(5, 18, 30, 0.22);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(14px);
      box-shadow: 0 1px 0 rgba(130, 150, 165, 0.14);
    }

    .crumb {
      color: #52677a;
    }

    .content {
      padding: 28px 32px 40px;
    }

    .hero {
      align-items: center;
      margin-bottom: 22px;
      padding-bottom: 4px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      margin-bottom: 10px;
      padding: 0 9px;
      border: 1px solid rgba(31, 120, 181, 0.18);
      border-radius: 6px;
      color: #0f6b82;
      background: rgba(230, 242, 251, 0.72);
    }

    h1 {
      color: #112d42;
      font-size: 30px;
    }

    .hero-desc {
      max-width: 780px;
      color: #586b7b;
    }

    .btn {
      border: 1px solid transparent;
      background: linear-gradient(135deg, #1f78b5 0%, #0f8177 100%);
      box-shadow: 0 10px 22px rgba(31, 120, 181, 0.16);
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(31, 120, 181, 0.2);
    }

    .btn.ghost {
      color: #1f4d66;
      background: rgba(255, 255, 255, 0.82);
      border-color: #cfdae4;
      box-shadow: 0 8px 18px rgba(21, 38, 55, 0.06);
    }

    .btn.ghost:hover:not(:disabled) {
      background: #ffffff;
      border-color: #aebfce;
    }

    .pill {
      border: 1px solid rgba(21, 129, 71, 0.12);
      background: #e7f7ed;
    }

    .overview {
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric,
    .panel,
    .notice {
      border-color: rgba(190, 205, 218, 0.84);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 18px 40px rgba(28, 50, 66, 0.08);
    }

    .metric {
      position: relative;
      min-height: 108px;
      padding: 17px 18px 16px;
      overflow: hidden;
    }

    .metric::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #1f78b5, #0f8177, #e0a72f);
    }

    .metric-label {
      color: #5f7181;
    }

    .metric-value {
      color: #102f46;
      font-size: 27px;
      line-height: 1.15;
    }

    .metric-note {
      color: #718394;
    }

    .workspace {
      gap: 18px;
    }

    .stack {
      gap: 18px;
    }

    .panel {
      overflow: hidden;
    }

    .panel-head {
      padding: 17px 19px 14px;
      background:
        linear-gradient(180deg, rgba(248, 252, 255, 0.94) 0%, rgba(255, 255, 255, 0.9) 100%);
    }

    .panel-title {
      color: #12364f;
      font-size: 16px;
    }

    .panel-sub {
      margin-top: 4px;
      color: #6b7d8d;
    }

    .panel-body {
      padding: 19px;
    }

    label {
      color: #2f4f64;
    }

    textarea,
    input {
      border-color: #c9d7e3;
      background: #fbfdff;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    textarea:hover,
    input:hover {
      background: #ffffff;
      border-color: #b6c9d8;
    }

    textarea {
      min-height: 238px;
      line-height: 1.8;
    }

    .form-row {
      grid-template-columns: minmax(0, 1fr) 136px;
    }

    .notice {
      position: relative;
      padding: 15px 16px 15px 18px;
      border-left: 4px solid #0f8177;
      color: #425b6e;
      background: linear-gradient(180deg, #fbfefd 0%, #f4faf8 100%);
    }

    .empty {
      min-height: 230px;
      border-color: #bfd2df;
      background:
        linear-gradient(180deg, rgba(251, 253, 255, 0.9), rgba(244, 249, 252, 0.96));
      color: #6b7d8d;
    }

    .result-hero,
    .report-content {
      border-color: #cfdde8;
      background: #fbfdff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85);
    }

    .result-band {
      background: linear-gradient(90deg, #ffffff 0%, #f3faf8 100%);
    }

    .tag {
      border: 1px solid transparent;
    }

    .tag.true,
    .tag.support,
    .tag.supported,
    .tag.success {
      border-color: rgba(21, 129, 71, 0.14);
    }

    .tag.false,
    .tag.attack,
    .tag.not_supported,
    .tag.failed {
      border-color: rgba(201, 58, 58, 0.14);
    }

    .tag.partly_true,
    .tag.partly_supported,
    .tag.insufficient_evidence,
    .tag.neutral,
    .tag.running,
    .tag.pending {
      border-color: rgba(166, 95, 0, 0.14);
    }

    .conclusion {
      color: #12364f;
      font-size: 21px;
    }

    .analysis {
      color: #344f63;
    }

    .section-title {
      position: relative;
      padding-left: 11px;
      color: #173c55;
    }

    .section-title::before {
      content: "";
      position: absolute;
      left: 0;
      top: 5px;
      bottom: 5px;
      width: 3px;
      border-radius: 999px;
      background: #0f8177;
    }

    .claim,
    .evidence {
      background: #fbfdff;
      border-color: #d7e4ec;
      box-shadow: 0 8px 18px rgba(28, 50, 66, 0.04);
    }

    .claim-no {
      background: linear-gradient(135deg, #1f78b5, #0f8177);
      box-shadow: 0 8px 16px rgba(31, 120, 181, 0.16);
    }

    .evidence {
      border-left-color: #0f8177;
    }

    .evidence-meta {
      padding-top: 10px;
      border-top: 1px solid #edf2f5;
    }

    .toast {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: #182838;
    }

    .compact-hidden {
      display: none;
    }

    .compact-workspace {
      grid-template-columns: minmax(340px, 0.76fr) minmax(0, 1.24fr);
      max-width: 1160px;
    }

    .input-panel,
    .output-panel {
      min-height: 0;

<body>

  <script>
    const el = {
      backendStatus: document.getElementById('backendStatus'),
      dbStatus: document.getElementById('dbStatus'),
      checkModeSelector: document.getElementById('checkModeSelector'),
      modeSelectBtn: document.getElementById('modeSelectBtn'),
      modeSelectMenu: document.getElementById('modeSelectMenu'),
      modeSelectText: document.getElementById('modeSelectText'),
      modeSelectIcon: document.getElementById('modeSelectIcon'),
      form: document.getElementById('checkForm'),
      inputPanel: document.getElementById('inputPanel'),
      inputText: document.getElementById('inputText'),
      hotEventId: document.getElementById('hotEventId'),
      analyzeBtn: document.getElementById('analyzeBtn'),
      resetBtn: document.getElementById('resetBtn'),
      advancedToggle: document.getElementById('advancedToggle'),
      exportBtn: document.getElementById('exportBtn'),
      previewReportBtn: document.getElementById('previewReportBtn'),
      reportPreviewModal: document.getElementById('reportPreviewModal'),
      reportPreviewFrame: document.getElementById('reportPreviewFrame'),
      closeReportPreviewBtn: document.getElementById('closeReportPreviewBtn'),
      currentUser: document.getElementById('currentUser'),
      logoutBtn: document.getElementById('logoutBtn'),
      resultView: document.getElementById('resultView'),
      claimEvidenceView: document.getElementById('claimEvidenceView'),
      reportView: document.getElementById('reportView'),
      taskMeta: document.getElementById('taskMeta'),
      metricTask: document.getElementById('metricTask'),
      metricStatus: document.getElementById('metricStatus'),
      metricClaims: document.getElementById('metricClaims'),
      metricEvidence: document.getElementById('metricEvidence'),
      toast: document.getElementById('toast')
    };

    let currentDetail = null;
    let selectedCheckMode = 'quick';
    el.inputPanel.classList.remove('show-advanced', 'has-result');

    function getToken() {
      return localStorage.getItem('sg_token');
    }

    async function requestJson(url, options) {
      options = options || {};
      var token = getToken();
      var headers = { 'Content-Type': 'application/json' };
      if (token) { headers['Authorization'] = 'Bearer ' + token; }
      if (options.headers) {
        Object.keys(options.headers).forEach(function(k) { headers[k] = options.headers[k]; });
      }
      var response = await fetch(url, {
        headers: headers,
        method: options.method || 'GET',
        body: options.body
      });
      if (response.status === 401) {
        localStorage.clear();
        window.location.href = '/login.html';
        throw new Error('请先登录');
      }
      var body = await response.json();
      if (!response.ok || (body.code && body.code >= 400)) {
        throw new Error(body.message || '请求失败');
      }
      return Object.prototype.hasOwnProperty.call(body, 'data') ? body.data : body;
    }

    function checkAuth() {
      var token = getToken();
      if (!token) {
        window.location.href = '/login.html';
        return false;
      }
      try {
        var payload = JSON.parse(atob(token.split('.')[1]));
        if (payload.exp * 1000 < Date.now()) {
          localStorage.clear();
          window.location.href = '/login.html';
          return false;
        }
      } catch (e) {
        localStorage.clear();
        window.location.href = '/login.html';
        return false;
      }
      return true;
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/login.html';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function showToast(message, type = 'info') {
      el.toast.textContent = message;
      el.toast.className = `toast show ${type === 'error' ? 'error' : ''}`;
      setTimeout(() => {
        el.toast.className = 'toast';
      }, 2600);
    }

    function formatTime(value) {
      if (!value) return '-';
      return String(value).replace('T', ' ').slice(0, 19);
    }

    function normalizeLabelText(result) {
      if (result.labelText) return result.labelText;
      if (result.label === 'true' || result.label === 'supported') return '真实';
      if (result.label === 'false' || result.label === 'not_supported') return '不支持';
      if (result.label === 'partly_true' || result.label === 'partly_supported') return '部分支持';
      if (result.label === 'insufficient_evidence') return '证据不足';
      return result.label || '未知';
    }

    function relationText(relation) {
      if (relation === 'support') return '支持';
      if (relation === 'attack') return '反驳';
      return '中立';
    }

    function tagClass(value) {
      return value || 'neutral';
    }

    function parseStructuredText(value) {
      if (!value) return null;
      if (typeof value === 'object') return value;
      const text = String(value).trim();
      if (!text || !text.startsWith('{') || !text.endsWith('}')) return null;

      try {
        return JSON.parse(text);
      } catch (error) {
        // Some model adapters return a Python-like dict string with single quotes.
      }

      const normalized = text
        .replace(/([{,]\s*)'([^']+?)'\s*:/g, '$1"$2":')
        .replace(/:\s*'([\s\S]*?)'\s*(?=[,}])/g, (_, content) => `:${JSON.stringify(content)}`);
      try {
        return JSON.parse(normalized);
      } catch (error) {
        const explanationMatch = text.match(/['"]explanation['"]\s*:\s*['"]([\s\S]*?)['"]\s*(?:[,}])/);
        if (explanationMatch) {
          return { explanation: explanationMatch[1] };
        }
        return null;
      }
    }

    function isStructuredText(value) {
      if (!value || typeof value !== 'string') return false;
      const text = value.trim();
      return text.startsWith('{') && text.endsWith('}');
    }

    function cleanDisplayText(value) {
      if (value == null) return '';
      if (typeof value === 'object') {
        return value.explanation || value.conclusion || value.content || '';
      }
      const parsed = parseStructuredText(value);
      if (parsed) {
        return parsed.explanation || parsed.conclusion || parsed.content || '';
      }
      return String(value).trim();
    }

    function normalizeResultDisplay(result) {
      const parsedConclusion = parseStructuredText(result.conclusion);
      const parsedAnalysis = parseStructuredText(result.analysisDetail);
      const rawConclusion = isStructuredText(result.conclusion) ? '' : cleanDisplayText(result.conclusion);
      const rawAnalysis = isStructuredText(result.analysisDetail) ? '' : cleanDisplayText(result.analysisDetail);

      return {
        conclusion: rawConclusion
          || cleanDisplayText(parsedConclusion && (parsedConclusion.conclusion || parsedConclusion.explanation))
          || cleanDisplayText(parsedAnalysis && parsedAnalysis.conclusion)
          || '暂无结论',
        explanation: cleanDisplayText(parsedAnalysis && parsedAnalysis.explanation)
          || rawAnalysis
          || cleanDisplayText(parsedConclusion && parsedConclusion.explanation)
          || '暂无详细分析。'
      };
    }

    function isAgentGeneratedEvidence(evidence) {
      const text = [
        evidence.title,
        evidence.evidenceTitle,
        evidence.sourceName,
        evidence.content,
        evidence.evidenceContent
      ].filter(Boolean).join(' ');
      return text.includes('智能体核查解释')
        || text.includes('SentiGuard FastAPI')
        || text.includes('SentiGuard 智能体');
    }

    function setCheckMode(mode) {
      selectedCheckMode = mode === 'deep' ? 'deep' : 'quick';
      const isDeep = selectedCheckMode === 'deep';
      el.modeSelectText.textContent = isDeep ? '深度核查' : '快速核查';
      el.modeSelectIcon.textContent = isDeep ? '✣' : '↯';
      el.modeSelectMenu.querySelectorAll('.mode-select-option').forEach(option => {
        option.classList.toggle('active', option.dataset.checkMode === selectedCheckMode);
      });
      closeModeMenu();
    }

    function openModeMenu() {
      el.checkModeSelector.classList.add('open');
      el.modeSelectBtn.setAttribute('aria-expanded', 'true');
    }

    function closeModeMenu() {
      el.checkModeSelector.classList.remove('open');
      el.modeSelectBtn.setAttribute('aria-expanded', 'false');
    }

    function toggleModeMenu() {
      if (el.checkModeSelector.classList.contains('open')) {
        closeModeMenu();
      } else {
        openModeMenu();
      }
    }

    function buildExportContent(detail) {
      const result = detail.result || {};
      const claims = detail.claims || [];
      const evidences = detail.evidences || [];
      const report = detail.report || {};
      const display = normalizeResultDisplay(result);
      const lines = [
        'SentiGuard 事实核查详情',
        '',
        `任务编号：${detail.taskId || '-'}`,
        `任务状态：${detail.status || '-'}`,
        `提交时间：${formatTime(detail.submitTime)}`,
        `完成时间：${formatTime(detail.finishTime)}`,
        '',
        '一、待核查陈述',
        detail.inputText || '-',
        '',
        '二、核查结论',
        `置信度：${result.confidenceScore == null ? '-' : result.confidenceScore + '%'}`,
        `结论摘要：${display.conclusion}`,
        `分析说明：${display.explanation}`,
        '',
        '三、声明拆解'
      ];

      if (claims.length) {
        claims.forEach((claim, index) => {
          lines.push(`${index + 1}. ${claim.claimText || '-'}`);
          lines.push(`   类型：${claim.claimType || '未分类'}`);
        });
      } else {
        lines.push('暂无声明拆解结果');
      }

      lines.push('', '四、证据材料');
      if (evidences.length) {
        evidences.forEach((evidence, index) => {
          const url = evidence.url || evidence.evidenceUrl || '-';
          const evidenceContent = cleanDisplayText(evidence.content || evidence.evidenceContent) || '-';
          lines.push(`${index + 1}. ${evidence.title || evidence.evidenceTitle || '未命名证据'}`);
          lines.push(`   关系：${relationText(evidence.relationType)}`);
          lines.push(`   来源：${evidence.sourceName || '未知来源'}`);
          lines.push(`   类型：${evidence.evidenceType || evidence.type || '证据'}`);
          lines.push(`   链接：${url}`);
          lines.push(`   内容：${evidenceContent}`);
        });
      } else {
        lines.push('暂无证据材料');
      }

      lines.push('', '五、核查报告', cleanDisplayText(report.content || report.reportContent) || '暂无报告内容');
      return lines.join('\n');
    }


    function getReportContent(detail) {
      const report = detail && detail.report ? detail.report : {};
      return report.content || report.reportContent || '';
    }

    function hasReportContent(detail) {
      return Boolean(String(getReportContent(detail)).trim());
    }

    function buildReportPreviewHtml(content) {
      const value = String(content || '').trim();
      if (!value) {
        return '<!doctype html><html lang="zh-CN"><body style="font-family: Microsoft YaHei, Arial, sans-serif; padding: 32px; color: #63748a;">暂无报告内容</body></html>';
      }
      if (/<!doctype|<html[\s>]/i.test(value)) {
        return value;
      }
      return `<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{margin:0;padding:32px;font-family:"Microsoft YaHei",Arial,sans-serif;color:#152235;background:#fff;line-height:1.75;}img,table{max-width:100%;}table{border-collapse:collapse;}td,th{border:1px solid #dbe5ee;padding:8px 10px;}h1,h2,h3{color:#0d2d43;}</style></head><body>${value}</body></html>`;
    }

    function previewReport() {
      if (!hasReportContent(currentDetail)) {
        showToast('暂无可预览的核查报告', 'error');
        return;
      }
      el.reportPreviewFrame.srcdoc = buildReportPreviewHtml(getReportContent(currentDetail));
      el.reportPreviewModal.classList.add('show');
      el.reportPreviewModal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeReportPreview() {
      el.reportPreviewModal.classList.remove('show');
      el.reportPreviewModal.setAttribute('aria-hidden', 'true');
      el.reportPreviewFrame.srcdoc = '';
      document.body.style.overflow = '';
    }
    function exportDetail() {
      if (!currentDetail) {
        showToast('暂无可导出的核查详情', 'error');
        return;
      }
      const content = buildExportContent(currentDetail);
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `sentiguard-check-${currentDetail.taskId || 'detail'}.txt`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showToast('核查详情已导出');
    }

    function toggleAdvancedOptions() {
      const expanded = el.inputPanel.classList.toggle('show-advanced');
      el.advancedToggle.textContent = expanded ? '收起选项' : '高级选项';
    }

    async function checkBackend() {
      try {
        await requestJson('/api/health');
        el.backendStatus.textContent = '后端已连接';
        el.backendStatus.classList.remove('error');
      } catch (error) {
        el.backendStatus.textContent = '后端异常';
        el.backendStatus.classList.add('error');
      }
    }

    async function checkDatabase() {
      try {
        const data = await requestJson('/api/health/db');
        el.dbStatus.textContent = data.database || '数据库正常';
        el.dbStatus.classList.remove('error');
      } catch (error) {
        el.dbStatus.textContent = '数据库异常';
        el.dbStatus.classList.add('error');
      }
    }

    async function analyze(event) {
      event.preventDefault();
      const inputText = el.inputText.value.trim();
      if (!inputText) {
        showToast('请输入待核查内容', 'error');
        return;
      }
      const checkMode = selectedCheckMode;
      const endpoint = checkMode === 'deep' ? '/api/fact-check/analyze/deep' : '/api/fact-check/analyze/quick';
      const payload = { inputText, checkMode };
      if (el.hotEventId.value) {
        payload.hotEventId = Number(el.hotEventId.value);
      }

      clearResultForLoading();
      setAnalyzeButtonsLoading(true, checkMode);
      el.metricStatus.textContent = '核查中';
      el.taskMeta.textContent = '正在核查';

      try {
        const detail = await requestJson(endpoint, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        renderDetail(detail);
        showToast('事实核查完成');
      } catch (error) {
        el.metricStatus.textContent = '核查失败';
        el.taskMeta.textContent = '核查失败';
        showToast(error.message, 'error');
      } finally {
        setAnalyzeButtonsLoading(false, checkMode);
      }
    }

    function setAnalyzeButtonsLoading(loading, mode) {
      el.analyzeBtn.disabled = loading;
      el.modeSelectBtn.disabled = loading;
      el.analyzeBtn.textContent = loading ? (mode === 'deep' ? '深度核查中...' : '快速核查中...') : '开始核查';
    }

    function clearResultForLoading() {
      currentDetail = null;
      el.inputPanel.classList.remove('has-result');
      el.exportBtn.disabled = true;
      el.previewReportBtn.disabled = true;
      el.metricTask.textContent = '-';
      el.metricStatus.textContent = '核查中';
      el.metricClaims.textContent = '0';
      el.metricEvidence.textContent = '0';
      el.taskMeta.textContent = '正在核查';
      el.resultView.className = 'empty';
      el.resultView.textContent = '正在核查，请稍候...';
      el.claimEvidenceView.className = 'empty';
      el.claimEvidenceView.style.display = 'none';
      el.claimEvidenceView.textContent = '';
      el.reportView.className = 'empty';
      el.reportView.textContent = '';
    }

    function renderDetail(detail) {
      currentDetail = detail;
      el.inputPanel.classList.add('has-result');
      el.exportBtn.disabled = false;
      el.previewReportBtn.disabled = !hasReportContent(detail);
      const result = detail.result || {};
      const claims = detail.claims || [];
      const evidences = detail.evidences || [];
      const report = detail.report || {};
      const display = normalizeResultDisplay(result);

      el.metricTask.textContent = detail.taskId || '-';
      el.metricStatus.textContent = detail.status === 'success' ? '已完成' : (detail.status || '-');
      el.metricClaims.textContent = claims.length;
      el.metricEvidence.textContent = evidences.length;
      el.taskMeta.textContent = `已完成 · ${formatTime(detail.finishTime || detail.submitTime)}`;

      const confidence = result.confidenceScore == null ? '' : `<span class="muted">置信度 ${escapeHtml(result.confidenceScore)}%</span>`;
      el.resultView.className = '';
      el.resultView.innerHTML = `
        <div class="result-hero compact-result">
          <div class="result-band">
            <div>
              <span class="tag ${tagClass(result.label)}">${escapeHtml(normalizeLabelText(result))}</span>
            </div>
            ${confidence}
          </div>
          <div class="analysis">
            <div class="conclusion">${escapeHtml(display.conclusion)}</div>
            <div>${escapeHtml(display.explanation)}</div>
          </div>
        </div>
      `;

      el.claimEvidenceView.className = '';
      el.claimEvidenceView.style.display = '';
      const visibleEvidences = evidences.filter(evidence => !isAgentGeneratedEvidence(evidence));
      el.claimEvidenceView.innerHTML = `
        <div class="result-summary">
          <div class="summary-item">
            <div class="summary-label">证据数量</div>
            <div class="summary-value">${escapeHtml(visibleEvidences.length)} 条</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">核查点</div>
            <div class="summary-value">${escapeHtml(claims.length)} 条</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">完成时间</div>
            <div class="summary-value">${escapeHtml(formatTime(detail.finishTime || detail.submitTime))}</div>
          </div>
        </div>
      `;

      el.reportView.className = 'empty';
      el.reportView.textContent = '';
    }

    function resetPage() {
      currentDetail = null;
      el.inputText.value = '';
      el.hotEventId.value = '';
      el.inputPanel.classList.remove('show-advanced', 'has-result');
      el.advancedToggle.textContent = '高级选项';
      el.exportBtn.disabled = true;
      el.previewReportBtn.disabled = true;
      el.metricTask.textContent = '-';
      el.metricStatus.textContent = '待提交';
      el.metricClaims.textContent = '0';
      el.metricEvidence.textContent = '0';
      el.taskMeta.textContent = '提交后展示核查结论';
      el.resultView.className = 'empty';
      el.resultView.textContent = '暂无核查结果';
      el.claimEvidenceView.className = 'empty';
      el.claimEvidenceView.style.display = 'none';
      el.claimEvidenceView.textContent = '';
      el.reportView.className = 'empty';
      el.reportView.textContent = '';
    }

    el.form.addEventListener('submit', analyze);
    el.modeSelectBtn.addEventListener('click', toggleModeMenu);
    el.modeSelectMenu.querySelectorAll('.mode-select-option').forEach(option => {
      option.addEventListener('click', () => setCheckMode(option.dataset.checkMode));
    });
    document.addEventListener('click', event => {
      if (!el.checkModeSelector.contains(event.target)) closeModeMenu();
    });
    el.resetBtn.addEventListener('click', resetPage);
    el.advancedToggle.addEventListener('click', toggleAdvancedOptions);
    el.exportBtn.addEventListener('click', exportDetail);
    el.previewReportBtn.addEventListener('click', previewReport);
    el.closeReportPreviewBtn.addEventListener('click', closeReportPreview);
    el.reportPreviewModal.addEventListener('click', event => {
      if (event.target === el.reportPreviewModal) closeReportPreview();
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape' && el.reportPreviewModal.classList.contains('show')) closeReportPreview();
    });
    el.logoutBtn.addEventListener('click', logout);

    if (checkAuth()) {
      var nickname = localStorage.getItem('sg_nickname') || localStorage.getItem('sg_username') || '用户';
      el.currentUser.textContent = nickname;
      el.currentUser.classList.remove('error');
      loadUserInfo();
    }

    async function loadUserInfo() {
      try {
        var user = await requestJson('/api/auth/me');
        el.currentUser.textContent = user.nickname || user.username;
        localStorage.setItem('sg_nickname', user.nickname || user.username);
      } catch (e) {
        // token 无效则跳转
        if (e.message && e.message.indexOf('401') >= 0 || e.message.indexOf('403') >= 0) {
          logout();
        }
      }
    }

    checkBackend();
    checkDatabase();
  </script>
</body>
</html>
