<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SentiGuard - 事实核查</title>
    <style>
      :root {
        --bg: #f0f2f5;
        --surface: #ffffff;
        --surface-soft: #f7fafc;
        --ink: #1a1a2e;
        --muted: #8b92a8;
        --line: #e2e6ef;
        --line-strong: #bfd0dd;
        --nav: #1a1d2e;
        --nav-dark: rgba(0, 0, 0, 0.2);
        --accent: #4361ee;
        --accent-gradient: linear-gradient(135deg, #4361ee, #3a0ca3);
        --blue: var(--accent);
        --blue-dark: #145986;
        --blue-soft: #dff0fc;
        --teal: #16878d;
        --teal-soft: #e0f5f2;
        --green: #2d6a4f;
        --green-soft: #d8f3dc;
        --red: #9b2226;
        --red-soft: #f8d7da;
        --amber: #e8590c;
        --amber-soft: #fff4e6;
        --shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        --shadow-soft: 0 1px 3px rgba(0, 0, 0, 0.04);
        --radius: 10px;
        --radius-lg: 14px;
        --hero-gradient: linear-gradient(
          135deg,
          #16878d 0%,
          #0d7377 50%,
          #1a1d2e 100%
        );
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a14;
          --surface: #141420;
          --surface-soft: #1a1a2e;
          --ink: #e4e6f0;
          --muted: #6b7280;
          --line: #2a2a3e;
          --line-strong: #3a3a50;
          --nav: #0d0d1a;
          --nav-dark: #0a0a16;
          --accent: #6c8cff;
          --accent-gradient: linear-gradient(135deg, #6c8cff, #7c3aed);
          --blue: var(--accent);
          --blue-dark: #93bbfc;
          --blue-soft: #1e3a5f;
          --teal: #2dd4bf;
          --teal-soft: #134e4a;
          --green: #52b788;
          --green-soft: #1b3a2a;
          --red: #ef4444;
          --red-soft: #3b1a1a;
          --amber: #ff922b;
          --amber-soft: #2d1f0a;
          --shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
          --shadow-soft: 0 1px 3px rgba(0, 0, 0, 0.15);
          --hero-gradient: linear-gradient(
            135deg,
            #134e4a 0%,
            #0f172a 50%,
            #0a0a14 100%
          );
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background: var(--bg);
        font-family: "Microsoft YaHei", Arial, sans-serif;
      }

      button,
      input,
      textarea {
        font: inherit;
      }
      button {
        border: 0;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
      }

      .sidebar {
        background: var(--nav);
        color: #dbe7f0;
        border-right: 1px solid #182635;
      }

      .brand {
        height: 82px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 22px;
        background: var(--nav-dark);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        flex-shrink: 0;
      }

      .brand-mark {
        width: 40px;
        height: 40px;
        display: grid;
        place-items: center;
        border-radius: 10px;
        color: #102a3b;
        background: linear-gradient(135deg, #f3c84b, #f59e0b);
        font-weight: 900;
        font-size: 18px;
      }

      .brand-name {
        font-size: 18px;
        font-weight: 900;
        color: #f0f4ff;
      }
      .brand-desc {
        margin-top: 2px;
        color: #8899b4;
        font-size: 11px;
      }
      .nav-block {
        padding: 18px 14px;
        flex: 1;
      }
      .nav-title {
        padding: 0 10px 10px;
        color: #6b7d95;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .nav-item {
        width: 100%;
        min-height: 44px;
        display: grid;
        grid-template-columns: 24px 1fr auto;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        border-radius: 8px;
        background: transparent;
        color: #c8d2e0;
        text-align: left;
        font-weight: 600;
        font-size: 14px;
        text-decoration: none;
        transition: all 0.15s;
        margin-bottom: 3px;
      }

      .nav-item:hover {
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
      }
      .nav-item.active {
        background: var(--accent);
        color: #ffffff;
        box-shadow: 0 2px 8px rgba(67, 97, 238, 0.3);
      }

      .badge {
        min-width: 40px;
        height: 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 8px;
        border-radius: 999px;
        color: #6b7d95;
        background: rgba(255, 255, 255, 0.08);
        font-size: 11px;
        font-weight: 900;
        white-space: nowrap;
      }

      .badge.live {
        color: #4ade80;
        background: rgba(74, 222, 128, 0.15);
      }
      .nav-item.active .badge {
        color: #fff;
        background: rgba(255, 255, 255, 0.2);
      }

      .main {
        min-width: 0;
        display: grid;
        grid-template-rows: 66px minmax(0, 1fr);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 0 28px;
        background: var(--surface);
        border-bottom: 1px solid var(--line);
      }

      .crumb {
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
      }
      .system-state {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .pill {
        height: 32px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 0 12px;
        border-radius: 999px;
        color: var(--green);
        background: var(--green-soft);
        font-size: 13px;
        font-weight: 900;
        white-space: nowrap;
      }
      .pill.error {
        color: var(--red);
        background: var(--red-soft);
      }

      /* 内容区允许自然滚动，不再强制一屏高度 */
      .content {
        padding: 24px 28px 40px;
        overflow: auto;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 18px;
        align-items: end;
        margin-bottom: 18px;
        background: var(--hero-gradient);
        border-radius: var(--radius-lg);
        padding: 28px 32px;
        color: #fff;
        position: relative;
        overflow: hidden;
      }
      .hero::before {
        content: "";
        position: absolute;
        top: -50px;
        right: -40px;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.04);
      }
      .hero::after {
        content: "";
        position: absolute;
        bottom: -60px;
        left: 30%;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.03);
      }

      .hero .eyebrow {
        margin-bottom: 8px;
        color: rgba(255, 255, 255, 0.8);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .hero h1 {
        margin: 0;
        font-size: 26px;
        font-weight: 900;
        color: #fff;
        position: relative;
        z-index: 1;
      }
      .hero .hero-desc {
        max-width: 850px;
        margin-top: 6px;
        color: rgba(255, 255, 255, 0.75);
        line-height: 1.7;
        font-size: 13px;
      }

      .hero .hero-actions {
        position: relative;
        z-index: 1;
      }
      .hero .btn.ghost {
        color: #fff;
        border-color: rgba(255, 255, 255, 0.3);
        background: transparent;
      }

      .hero-actions {
        display: flex;
        gap: 10px;
      }

      .btn {
        height: 40px;
        min-width: 104px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 0 15px;
        border-radius: 6px;
        color: #ffffff;
        background: var(--blue);
        font-weight: 900;
      }

      .btn.secondary {
        color: #24475f;
        background: #dfeaf2;
      }
      .btn.ghost {
        color: var(--muted);
        background: transparent;
        border: 1px solid var(--line);
      }
      .btn.ghost:hover {
        background: rgba(0, 0, 0, 0.04);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .workspace {
        display: grid;
        grid-template-columns: 1fr; /* 垂直流，不再左右分栏 */
        gap: 18px;
        max-width: 1160px;
        margin: 0 auto;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow-soft);
      }

      .panel-head {
        min-height: 58px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 18px 12px;
        border-bottom: 1px solid var(--line);
      }

      .panel-title {
        color: var(--blue-dark);
        font-size: 17px;
        font-weight: 900;
      }
      .panel-sub {
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .panel-body {
        padding: 18px;
      }

      .form {
        display: grid;
        gap: 14px;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      label {
        color: #3f5367;
        font-size: 13px;
        font-weight: 900;
      }

      textarea,
      input {
        width: 100%;
        border: 1px solid #44445c;
        border-radius: 6px;
        color: #e8edf3;
        background: #2c2c40;
        outline: none;
      }

      textarea {
        min-height: 160px; /* 适度缩小最小高度 */
        padding: 13px 14px;
        resize: vertical;
        line-height: 1.75;
      }

      input {
        height: 40px;
        padding: 0 12px;
      }

      textarea:focus,
      input:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(31, 120, 181, 0.12);
      }

      .form-row {
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        gap: 12px;
      }

      .hot-event-field {
        display: none;
      }
      .input-panel.show-advanced .hot-event-field {
        display: block;
      }

      .advanced-toggle {
        flex: 0 0 auto;
      }
      #resetBtn,
      #analyzeBtn {
        flex: 0 0 auto;
      }

      .check-mode-selector {
        position: relative;
        flex: 0 0 auto;
      }

      .mode-select-trigger {
        min-width: 128px;
        height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0 14px;
        border: 1px solid #c8d7e3;
        border-radius: 8px;
        color: #15384f;
        background: #ffffff;
        font-weight: 900;
      }

      .mode-select-trigger:disabled {
        opacity: 0.58;
        cursor: not-allowed;
      }
      .mode-select-icon {
        width: 18px;
        display: inline-flex;
        justify-content: center;
        color: #0f7d86;
        font-weight: 900;
      }
      .mode-select-caret {
        color: #7a8b9c;
        font-size: 13px;
      }

      .mode-select-menu {
        position: absolute;
        right: 0;
        bottom: calc(100% + 10px);
        z-index: 40;
        width: 292px;
        display: none;
        padding: 8px;
        border: 1px solid #dbe5ee;
        border-radius: 10px;
        background: #ffffff;
        box-shadow: 0 20px 46px rgba(15, 38, 55, 0.18);
      }

      .check-mode-selector.open .mode-select-menu {
        display: grid;
        gap: 4px;
      }

      .mode-select-option {
        width: 100%;
        display: grid;
        grid-template-columns: 24px minmax(0, 1fr) 20px;
        align-items: center;
        gap: 10px;
        padding: 10px 9px;
        border-radius: 8px;
        color: #16364d;
        background: transparent;
        text-align: left;
      }

      .mode-select-option:hover,
      .mode-select-option.active {
        background: #f3f8fb;
      }
      .mode-select-option strong,
      .mode-select-option small {
        display: block;
        line-height: 1.35;
      }
      .mode-select-option small {
        margin-top: 3px;
        color: #8a98a8;
        font-weight: 700;
      }
      .mode-selected-mark {
        visibility: hidden;
        color: #0b1f2d;
        font-weight: 900;
      }
      .mode-select-option.active .mode-selected-mark {
        visibility: visible;
      }

      /* 空状态与结果区域的现代化处理 */
      .empty-state {
        min-height: 160px;
        display: grid;
        place-items: center;
        padding: 24px;
        border-radius: 10px;
        background:
          radial-gradient(
            circle at 50% 28%,
            rgba(45, 120, 168, 0.08),
            transparent 34%
          ),
          linear-gradient(180deg, #fbfdfe, #f7fafc);
        border: 1px solid #dce7ef;
        color: var(--muted);
        text-align: center;
        line-height: 1.8;
      }

      .empty-state-content {
        display: grid;
        gap: 8px;
        justify-items: center;
      }

      .empty-state-icon {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: linear-gradient(135deg, #edf6fb, #ffffff);
        box-shadow:
          inset 0 0 0 1px rgba(45, 120, 168, 0.1),
          0 12px 26px rgba(45, 120, 168, 0.1);
        color: #2d78a8;
        font-size: 24px;
      }

      /* 结果卡片 */
      .result-hero {
        border: 1px solid #dce7ef;
        border-radius: 10px;
        background: #ffffff;
        overflow: hidden;
      }

      .result-band {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px;
        align-items: center;
        padding: 17px 18px;
        background: #ffffff;
        border-bottom: 1px solid #dce7ef;
      }

      .tag {
        min-width: 74px;
        height: 31px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 11px;
        border-radius: 5px;
        font-size: 13px;
        font-weight: 900;
        white-space: nowrap;
      }

      .tag.true,
      .tag.support,
      .tag.supported,
      .tag.success {
        color: var(--green);
        background: var(--green-soft);
      }
      .tag.false,
      .tag.attack,
      .tag.not_supported,
      .tag.failed {
        color: var(--red);
        background: var(--red-soft);
      }
      .tag.partly_true,
      .tag.partly_supported,
      .tag.insufficient_evidence,
      .tag.neutral,
      .tag.running,
      .tag.pending {
        color: var(--amber);
        background: var(--amber-soft);
      }

      .conclusion {
        font-size: 22px;
        line-height: 1.55;
        font-weight: 900;
      }
      .analysis {
        padding: 16px 18px 18px;
        color: #35495d;
        line-height: 1.85;
        font-size: 14px;
      }

      .muted {
        color: var(--muted);
        font-size: 13px;
      }

      .result-summary {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
        margin-top: 18px;
      }

      .summary-item {
        min-height: 76px;
        padding: 14px 15px;
        border: 1px solid #d9e4ec;
        border-radius: 8px;
        background: #fbfdff;
      }

      .summary-label {
        color: #6a7d8e;
        font-size: 12px;
        font-weight: 900;
      }
      .summary-value {
        margin-top: 7px;
        color: #0d354b;
        font-size: 19px;
        font-weight: 900;
      }

      .output-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .toast {
        position: fixed;
        right: 24px;
        bottom: 24px;
        max-width: 420px;
        min-width: 260px;
        padding: 13px 15px;
        border-radius: 8px;
        color: #ffffff;
        background: #1f2937;
        box-shadow: var(--shadow);
        opacity: 0;
        pointer-events: none;
        transform: translateY(10px);
        transition: 0.2s ease;
        z-index: 30;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }
      .toast.error {
        background: var(--red);
      }

      .report-preview-modal {
        position: fixed;
        inset: 0;
        z-index: 80;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 28px;
        background: rgba(13, 34, 50, 0.54);
      }

      .report-preview-modal.show {
        display: flex;
      }

      .report-preview-dialog {
        width: min(1120px, 100%);
        height: min(820px, calc(100vh - 56px));
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border-radius: 10px;
        background: #ffffff;
        box-shadow: 0 28px 80px rgba(15, 38, 55, 0.24);
      }

      .report-preview-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 20px;
        border-bottom: 1px solid #dbe5ee;
      }

      .report-preview-title {
        margin: 0;
        color: #0d2d43;
        font-size: 18px;
        font-weight: 900;
      }
      .report-preview-frame {
        flex: 1;
        width: 100%;
        border: 0;
        background: #ffffff;
      }

      @media (max-width: 820px) {
        .app {
          grid-template-columns: 1fr;
        }
        .topbar {
          height: auto;
          padding: 14px 18px;
        }
        .content {
          padding: 18px 14px 28px;
        }
        .form-row {
          flex-direction: column;
          align-items: stretch;
        }
        .form-row > * {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">SG</div>
          <div>
            <div class="brand-name">SentiGuard</div>
            <div class="brand-desc">舆情监测与事实核查平台</div>
          </div>
        </div>
        <div class="nav-block">
          <div class="nav-title">功能导航</div>
          <a href="/dashboard.html" class="nav-item"
            ><span>🔥</span><span>舆情监测</span
            ><span class="badge live">实时</span></a
          >
          <a href="/opinion.html" class="nav-item"
            ><span>◉</span><span>观点分析</span
            ><span class="badge live">分析</span></a
          >
          <a href="/" class="nav-item active"
            ><span>✓</span><span>核查工作台</span
            ><span class="badge">提交</span></a
          >
          <a href="/history.html" class="nav-item"
            ><span>▤</span><span>核查历史</span
            ><span class="badge live">在线</span></a
          >
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="crumb">事实核查</div>
          <div class="system-state">
            <span id="currentUser" class="pill" style="cursor: default"
              >未登录</span
            >
            <span id="backendStatus" class="pill">后端检测中</span>
            <span id="dbStatus" class="pill">数据库检测中</span>
            <button
              id="logoutBtn"
              class="btn ghost"
              type="button"
              style="min-width: 60px; height: 32px; font-size: 12px"
            >
              退出
            </button>
          </div>
        </header>

        <section class="content">
          <section class="hero">
            <div>
              <div class="eyebrow">Fact-Check Workspace</div>
              <h1>核查工作台</h1>
              <div class="hero-desc">
                面向公开信息、政策表述与事件陈述的事实核验，形成可追溯的结论、证据与报告。
              </div>
            </div>
            <div class="hero-actions">
              <a class="btn ghost" href="/history.html">核查历史</a>
            </div>
          </section>

          <section class="workspace">
            <!-- 输入面板 -->
            <div id="inputPanel" class="panel input-panel">
              <div class="panel-head">
                <div>
                  <div class="panel-title">提交核查</div>
                  <div class="panel-sub">
                    输入待核查陈述，必要时关联热点编号
                  </div>
                </div>
              </div>
              <div class="panel-body">
                <form id="checkForm" class="form">
                  <div class="field">
                    <label for="inputText">待核查陈述</label>
                    <textarea
                      id="inputText"
                      required
                      placeholder="请输入待核查的事实性陈述，可包含时间、地点、主体和事件描述。"
                    ></textarea>
                  </div>

                  <div class="form-row">
                    <div class="field hot-event-field">
                      <label for="hotEventId">关联热点 ID</label>
                      <input
                        id="hotEventId"
                        type="number"
                        min="1"
                        placeholder="可选"
                      />
                    </div>
                    <button
                      id="advancedToggle"
                      class="btn ghost advanced-toggle"
                      type="button"
                    >
                      高级选项
                    </button>
                    <div id="checkModeSelector" class="check-mode-selector">
                      <button
                        id="modeSelectBtn"
                        class="mode-select-trigger"
                        type="button"
                        aria-haspopup="true"
                        aria-expanded="false"
                      >
                        <span id="modeSelectIcon" class="mode-select-icon"
                          >↯</span
                        >
                        <span id="modeSelectText" class="mode-select-text"
                          >快速核查</span
                        >
                        <span class="mode-select-caret">⌄</span>
                      </button>
                      <div
                        id="modeSelectMenu"
                        class="mode-select-menu"
                        role="menu"
                      >
                        <button
                          class="mode-select-option active"
                          type="button"
                          data-check-mode="quick"
                          role="menuitem"
                        >
                          <span class="mode-select-icon">↯</span>
                          <span
                            ><strong>快速核查</strong
                            ><small>适用于大部分情况</small></span
                          >
                          <span class="mode-selected-mark">✓</span>
                        </button>
                        <button
                          class="mode-select-option"
                          type="button"
                          data-check-mode="deep"
                          role="menuitem"
                        >
                          <span class="mode-select-icon">✣</span>
                          <span
                            ><strong>深度核查</strong
                            ><small>多轮反思与完整证据检索</small></span
                          >
                          <span class="mode-selected-mark">✓</span>
                        </button>
                      </div>
                    </div>
                    <button id="resetBtn" class="btn ghost" type="button">
                      重置
                    </button>
                    <button id="analyzeBtn" class="btn" type="submit">
                      开始核查
                    </button>
                  </div>
                </form>
              </div>
            </div>

            <!-- 输出面板 -->
            <div class="panel output-panel">
              <div class="panel-head">
                <div>
                  <div class="panel-title">核查结果</div>
                  <div id="taskMeta" class="panel-sub">提交后展示核查结论</div>
                </div>
                <div class="output-actions">
                  <button
                    id="previewReportBtn"
                    class="btn ghost export-btn"
                    type="button"
                    disabled
                  >
                    预览报告
                  </button>
                  <button
                    id="exportBtn"
                    class="btn ghost export-btn"
                    type="button"
                    disabled
                  >
                    导出详情
                  </button>
                </div>
              </div>
              <div class="panel-body">
                <!-- 单一结果容器，高度由内容决定 -->
                <div id="resultContainer" class="empty-state">
                  <div class="empty-state-content">
                    <div class="empty-state-icon">✓</div>
                    <div>暂无核查结果</div>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </section>
      </main>
    </div>

    <div id="toast" class="toast"></div>

    <div
      id="reportPreviewModal"
      class="report-preview-modal"
      aria-hidden="true"
    >
      <section
        class="report-preview-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="reportPreviewTitle"
      >
        <div class="report-preview-head">
          <h2 id="reportPreviewTitle" class="report-preview-title">
            核查报告预览
          </h2>
          <button
            id="closeReportPreviewBtn"
            class="btn ghost icon"
            type="button"
            aria-label="关闭"
          >
            ×
          </button>
        </div>
        <iframe
          id="reportPreviewFrame"
          class="report-preview-frame"
          title="核查报告 HTML 预览"
          sandbox
        ></iframe>
      </section>
    </div>

    <script>
      const el = {
        backendStatus: document.getElementById("backendStatus"),
        dbStatus: document.getElementById("dbStatus"),
        checkModeSelector: document.getElementById("checkModeSelector"),
        modeSelectBtn: document.getElementById("modeSelectBtn"),
        modeSelectMenu: document.getElementById("modeSelectMenu"),
        modeSelectText: document.getElementById("modeSelectText"),
        modeSelectIcon: document.getElementById("modeSelectIcon"),
        form: document.getElementById("checkForm"),
        inputPanel: document.getElementById("inputPanel"),
        inputText: document.getElementById("inputText"),
        hotEventId: document.getElementById("hotEventId"),
        analyzeBtn: document.getElementById("analyzeBtn"),
        resetBtn: document.getElementById("resetBtn"),
        advancedToggle: document.getElementById("advancedToggle"),
        exportBtn: document.getElementById("exportBtn"),
        previewReportBtn: document.getElementById("previewReportBtn"),
        reportPreviewModal: document.getElementById("reportPreviewModal"),
        reportPreviewFrame: document.getElementById("reportPreviewFrame"),
        closeReportPreviewBtn: document.getElementById("closeReportPreviewBtn"),
        currentUser: document.getElementById("currentUser"),
        logoutBtn: document.getElementById("logoutBtn"),
        resultContainer: document.getElementById("resultContainer"),
        taskMeta: document.getElementById("taskMeta"),
        toast: document.getElementById("toast"),
      };

      let currentDetail = null;
      let selectedCheckMode = "quick";
      el.inputPanel.classList.remove("show-advanced", "has-result");

      function getToken() {
        return localStorage.getItem("sg_token");
      }

      async function requestJson(url, options = {}) {
        const token = getToken();
        const headers = {
          "Content-Type": "application/json",
          ...(options.headers || {}),
        };
        if (token) {
          headers.Authorization = `Bearer ${token}`;
        }
        const response = await fetch(url, {
          ...options,
          headers,
        });
        if (response.status === 401) {
          localStorage.clear();
          window.location.href = "/login.html";
          throw new Error("请先登录");
        }
        const body = await response.json();
        if (!response.ok || (body.code && body.code >= 400)) {
          throw new Error(body.message || "请求失败");
        }
        return Object.prototype.hasOwnProperty.call(body, "data")
          ? body.data
          : body;
      }

      function checkAuth() {
        const token = getToken();
        if (!token) {
          window.location.href = "/login.html";
          return false;
        }
        try {
          const payload = JSON.parse(atob(token.split(".")[1]));
          if (payload.exp * 1000 < Date.now()) {
            localStorage.clear();
            window.location.href = "/login.html";
            return false;
          }
        } catch (e) {
          localStorage.clear();
          window.location.href = "/login.html";
          return false;
        }
        return true;
      }

      function logout() {
        localStorage.clear();
        window.location.href = "/login.html";
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function showToast(message, type = "info") {
        el.toast.textContent = message;
        el.toast.className = `toast show ${type === "error" ? "error" : ""}`;
        setTimeout(() => {
          el.toast.className = "toast";
        }, 2600);
      }

      function formatTime(value) {
        if (!value) return "-";
        return String(value).replace("T", " ").slice(0, 19);
      }

      function normalizeLabelText(result) {
        if (result.labelText) return result.labelText;
        if (result.label === "true" || result.label === "supported")
          return "真实";
        if (result.label === "false" || result.label === "not_supported")
          return "不支持";
        if (
          result.label === "partly_true" ||
          result.label === "partly_supported"
        )
          return "部分支持";
        if (result.label === "insufficient_evidence") return "证据不足";
        return result.label || "未知";
      }

      function relationText(relation) {
        if (relation === "support") return "支持";
        if (relation === "attack") return "反驳";
        return "中立";
      }

      function tagClass(value) {
        return value || "neutral";
      }

      function parseStructuredText(value) {
        if (!value) return null;
        if (typeof value === "object") return value;
        const text = String(value).trim();
        if (!text || !text.startsWith("{") || !text.endsWith("}")) return null;
        try {
          return JSON.parse(text);
        } catch (error) {}
        const normalized = text
          .replace(/([{,]\s*)'([^']+?)'\s*:/g, '$1"$2":')
          .replace(
            /:\s*'([\s\S]*?)'\s*(?=[,}])/g,
            (_, content) => `:${JSON.stringify(content)}`,
          );
        try {
          return JSON.parse(normalized);
        } catch (error) {
          const explanationMatch = text.match(
            /['"]explanation['"]\s*:\s*['"]([\s\S]*?)['"]\s*(?:[,}])/,
          );
          if (explanationMatch) return { explanation: explanationMatch[1] };
          return null;
        }
      }

      function isStructuredText(value) {
        if (!value || typeof value !== "string") return false;
        const text = value.trim();
        return text.startsWith("{") && text.endsWith("}");
      }

      function cleanDisplayText(value) {
        if (value == null) return "";
        if (typeof value === "object") {
          return value.explanation || value.conclusion || value.content || "";
        }
        const parsed = parseStructuredText(value);
        if (parsed)
          return (
            parsed.explanation || parsed.conclusion || parsed.content || ""
          );
        return String(value).trim();
      }

      function normalizeResultDisplay(result) {
        const parsedConclusion = parseStructuredText(result.conclusion);
        const parsedAnalysis = parseStructuredText(result.analysisDetail);
        const rawConclusion = isStructuredText(result.conclusion)
          ? ""
          : cleanDisplayText(result.conclusion);
        const rawAnalysis = isStructuredText(result.analysisDetail)
          ? ""
          : cleanDisplayText(result.analysisDetail);
        return {
          conclusion:
            rawConclusion ||
            cleanDisplayText(
              parsedConclusion &&
                (parsedConclusion.conclusion || parsedConclusion.explanation),
            ) ||
            cleanDisplayText(parsedAnalysis && parsedAnalysis.conclusion) ||
            "暂无结论",
          explanation:
            cleanDisplayText(parsedAnalysis && parsedAnalysis.explanation) ||
            rawAnalysis ||
            cleanDisplayText(
              parsedConclusion && parsedConclusion.explanation,
            ) ||
            "暂无详细分析。",
        };
      }

      function isAgentGeneratedEvidence(evidence) {
        const text = [
          evidence.title,
          evidence.evidenceTitle,
          evidence.sourceName,
          evidence.content,
          evidence.evidenceContent,
        ]
          .filter(Boolean)
          .join(" ");
        return (
          text.includes("智能体核查解释") ||
          text.includes("SentiGuard FastAPI") ||
          text.includes("SentiGuard 智能体")
        );
      }

      function setCheckMode(mode) {
        selectedCheckMode = mode === "deep" ? "deep" : "quick";
        const isDeep = selectedCheckMode === "deep";
        el.modeSelectText.textContent = isDeep ? "深度核查" : "快速核查";
        el.modeSelectIcon.textContent = isDeep ? "✣" : "↯";
        el.modeSelectMenu
          .querySelectorAll(".mode-select-option")
          .forEach((option) => {
            option.classList.toggle(
              "active",
              option.dataset.checkMode === selectedCheckMode,
            );
          });
        closeModeMenu();
      }

      function openModeMenu() {
        el.checkModeSelector.classList.add("open");
        el.modeSelectBtn.setAttribute("aria-expanded", "true");
      }

      function closeModeMenu() {
        el.checkModeSelector.classList.remove("open");
        el.modeSelectBtn.setAttribute("aria-expanded", "false");
      }

      function toggleModeMenu() {
        if (el.checkModeSelector.classList.contains("open")) closeModeMenu();
        else openModeMenu();
      }

      function buildExportContent(detail) {
        const result = detail.result || {};
        const claims = detail.claims || [];
        const evidences = detail.evidences || [];
        const report = detail.report || {};
        const display = normalizeResultDisplay(result);
        const lines = [
          "SentiGuard 事实核查详情",
          "",
          `任务编号：${detail.taskId || "-"}`,
          `任务状态：${detail.status || "-"}`,
          `提交时间：${formatTime(detail.submitTime)}`,
          `完成时间：${formatTime(detail.finishTime)}`,
          "",
          "一、待核查陈述",
          detail.inputText || "-",
          "",
          "二、核查结论",
          `置信度：${result.confidenceScore == null ? "-" : result.confidenceScore + "%"}`,
          `结论摘要：${display.conclusion}`,
          `分析说明：${display.explanation}`,
          "",
          "三、声明拆解",
        ];
        if (claims.length) {
          claims.forEach((claim, index) => {
            lines.push(`${index + 1}. ${claim.claimText || "-"}`);
            lines.push(`   类型：${claim.claimType || "未分类"}`);
          });
        } else {
          lines.push("暂无声明拆解结果");
        }
        lines.push("", "四、证据材料");
        if (evidences.length) {
          evidences.forEach((evidence, index) => {
            const url = evidence.url || evidence.evidenceUrl || "-";
            const evidenceContent =
              cleanDisplayText(evidence.content || evidence.evidenceContent) ||
              "-";
            lines.push(
              `${index + 1}. ${evidence.title || evidence.evidenceTitle || "未命名证据"}`,
            );
            lines.push(`   关系：${relationText(evidence.relationType)}`);
            lines.push(`   来源：${evidence.sourceName || "未知来源"}`);
            lines.push(
              `   类型：${evidence.evidenceType || evidence.type || "证据"}`,
            );
            lines.push(`   链接：${url}`);
            lines.push(`   内容：${evidenceContent}`);
          });
        } else {
          lines.push("暂无证据材料");
        }
        lines.push(
          "",
          "五、核查报告",
          cleanDisplayText(report.content || report.reportContent) ||
            "暂无报告内容",
        );
        return lines.join("\n");
      }

      function getReportContent(detail) {
        const report = detail && detail.report ? detail.report : {};
        return report.content || report.reportContent || "";
      }

      function hasReportContent(detail) {
        return Boolean(String(getReportContent(detail)).trim());
      }

      function buildReportPreviewHtml(content) {
        const value = String(content || "").trim();
        if (!value) {
          return '<!doctype html><html lang="zh-CN"><body style="font-family: Microsoft YaHei, Arial, sans-serif; padding: 32px; color: #63748a;">暂无报告内容</body></html>';
        }
        if (/<!doctype|<html[\s>]/i.test(value)) return value;
        return `<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{margin:0;padding:32px;font-family:"Microsoft YaHei",Arial,sans-serif;color:#152235;background:#fff;line-height:1.75;}img,table{max-width:100%;}table{border-collapse:collapse;}td,th{border:1px solid #dbe5ee;padding:8px 10px;}h1,h2,h3{color:#0d2d43;}</style></head><body>${value}</body></html>`;
      }

      function previewReport() {
        if (!hasReportContent(currentDetail)) {
          showToast("暂无可预览的核查报告", "error");
          return;
        }
        el.reportPreviewFrame.srcdoc = buildReportPreviewHtml(
          getReportContent(currentDetail),
        );
        el.reportPreviewModal.classList.add("show");
        el.reportPreviewModal.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }

      function closeReportPreview() {
        el.reportPreviewModal.classList.remove("show");
        el.reportPreviewModal.setAttribute("aria-hidden", "true");
        el.reportPreviewFrame.srcdoc = "";
        document.body.style.overflow = "";
      }

      function exportDetail() {
        if (!currentDetail) {
          showToast("暂无可导出的核查详情", "error");
          return;
        }
        const content = buildExportContent(currentDetail);
        const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `sentiguard-check-${currentDetail.taskId || "detail"}.txt`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        showToast("核查详情已导出");
      }

      function toggleAdvancedOptions() {
        const expanded = el.inputPanel.classList.toggle("show-advanced");
        el.advancedToggle.textContent = expanded ? "收起选项" : "高级选项";
      }

      async function checkBackend() {
        try {
          await requestJson("/api/health");
          el.backendStatus.textContent = "后端已连接";
          el.backendStatus.classList.remove("error");
        } catch (error) {
          el.backendStatus.textContent = "后端异常";
          el.backendStatus.classList.add("error");
        }
      }

      async function checkDatabase() {
        try {
          const data = await requestJson("/api/health/db");
          el.dbStatus.textContent = data.database || "数据库正常";
          el.dbStatus.classList.remove("error");
        } catch (error) {
          el.dbStatus.textContent = "数据库异常";
          el.dbStatus.classList.add("error");
        }
      }

      async function analyze(event) {
        event.preventDefault();
        const inputText = el.inputText.value.trim();
        if (!inputText) {
          showToast("请输入待核查内容", "error");
          return;
        }
        const checkMode = selectedCheckMode;
        const endpoint =
          checkMode === "deep"
            ? "/api/fact-check/analyze/deep"
            : "/api/fact-check/analyze/quick";
        const payload = { inputText, checkMode };
        if (el.hotEventId.value)
          payload.hotEventId = Number(el.hotEventId.value);

        // 显示加载状态
        el.resultContainer.className = "empty-state";
        el.resultContainer.innerHTML = `<div class="empty-state-content"><div class="empty-state-icon">⏳</div><div>正在核查，请稍候...</div></div>`;
        el.taskMeta.textContent = "正在核查";
        setAnalyzeButtonsLoading(true, checkMode);

        try {
          const detail = await requestJson(endpoint, {
            method: "POST",
            body: JSON.stringify(payload),
          });
          renderDetail(detail);
          showToast("事实核查完成");
        } catch (error) {
          el.taskMeta.textContent = "核查失败";
          el.resultContainer.className = "empty-state";
          el.resultContainer.innerHTML = `<div class="empty-state-content"><div class="empty-state-icon">!</div><div>核查失败：${escapeHtml(error.message)}</div></div>`;
          showToast(error.message, "error");
        } finally {
          setAnalyzeButtonsLoading(false, checkMode);
        }
      }

      function setAnalyzeButtonsLoading(loading, mode) {
        el.analyzeBtn.disabled = loading;
        el.modeSelectBtn.disabled = loading;
        el.analyzeBtn.textContent = loading
          ? mode === "deep"
            ? "深度核查中..."
            : "快速核查中..."
          : "开始核查";
      }

      function renderDetail(detail) {
        currentDetail = detail;
        el.inputPanel.classList.add("has-result");
        el.exportBtn.disabled = false;
        el.previewReportBtn.disabled = !hasReportContent(detail);
        const result = detail.result || {};
        const claims = detail.claims || [];
        const evidences = detail.evidences || [];
        const display = normalizeResultDisplay(result);
        const visibleEvidences = evidences.filter(
          (evidence) => !isAgentGeneratedEvidence(evidence),
        );

        el.taskMeta.textContent = `已完成 · ${formatTime(detail.finishTime || detail.submitTime)}`;

        el.resultContainer.className = "";
        el.resultContainer.innerHTML = `
        <div class="result-hero">
          <div class="result-band">
            <div>
              <span class="tag ${tagClass(result.label)}">${escapeHtml(normalizeLabelText(result))}</span>
            </div>
            <span class="muted">${result.confidenceScore == null ? "" : `置信度 ${escapeHtml(result.confidenceScore)}%`}</span>
          </div>
          <div class="analysis">
            <div class="conclusion">${escapeHtml(display.conclusion)}</div>
            <div>${escapeHtml(display.explanation)}</div>
          </div>
        </div>
        <div class="result-summary">
          <div class="summary-item">
            <div class="summary-label">证据数量</div>
            <div class="summary-value">${escapeHtml(visibleEvidences.length)} 条</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">核查点</div>
            <div class="summary-value">${escapeHtml(claims.length)} 条</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">完成时间</div>
            <div class="summary-value">${escapeHtml(formatTime(detail.finishTime || detail.submitTime))}</div>
          </div>
        </div>
      `;
      }

      function resetPage() {
        currentDetail = null;
        el.inputText.value = "";
        el.hotEventId.value = "";
        el.inputPanel.classList.remove("show-advanced", "has-result");
        el.advancedToggle.textContent = "高级选项";
        el.exportBtn.disabled = true;
        el.previewReportBtn.disabled = true;
        el.taskMeta.textContent = "提交后展示核查结论";
        el.resultContainer.className = "empty-state";
        el.resultContainer.innerHTML = `
        <div class="empty-state-content">
          <div class="empty-state-icon">✓</div>
          <div>暂无核查结果</div>
        </div>
      `;
      }

      el.form.addEventListener("submit", analyze);
      el.modeSelectBtn.addEventListener("click", toggleModeMenu);
      el.modeSelectMenu
        .querySelectorAll(".mode-select-option")
        .forEach((option) => {
          option.addEventListener("click", () =>
            setCheckMode(option.dataset.checkMode),
          );
        });
      document.addEventListener("click", (event) => {
        if (!el.checkModeSelector.contains(event.target)) closeModeMenu();
      });
      el.resetBtn.addEventListener("click", resetPage);
      el.advancedToggle.addEventListener("click", toggleAdvancedOptions);
      el.exportBtn.addEventListener("click", exportDetail);
      el.previewReportBtn.addEventListener("click", previewReport);
      el.closeReportPreviewBtn.addEventListener("click", closeReportPreview);
      el.reportPreviewModal.addEventListener("click", (event) => {
        if (event.target === el.reportPreviewModal) closeReportPreview();
      });
      document.addEventListener("keydown", (event) => {
        if (
          event.key === "Escape" &&
          el.reportPreviewModal.classList.contains("show")
        )
          closeReportPreview();
      });
      el.logoutBtn.addEventListener("click", logout);

      if (checkAuth()) {
        const nickname =
          localStorage.getItem("sg_nickname") ||
          localStorage.getItem("sg_username") ||
          "用户";
        el.currentUser.textContent = nickname;
        el.currentUser.classList.remove("error");
        loadUserInfo();
      }

      async function loadUserInfo() {
        try {
          const user = await requestJson("/api/auth/me");
          el.currentUser.textContent = user.nickname || user.username;
          localStorage.setItem("sg_nickname", user.nickname || user.username);
        } catch (e) {
          if (
            e.message &&
            (e.message.includes("401") || e.message.includes("403"))
          )
            logout();
        }
      }

      checkBackend();
      checkDatabase();
    </script>
  </body>
</html>
