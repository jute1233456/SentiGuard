server:
  port: 8080

spring:
  profiles:
    active: local

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/sentiguard?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:gjh !}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.sentiguard.backend.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:c2VudGlndWFyZC1qd3Qtc2VjcmV0LWtleS0yMDI0LWZvci1kZXYtZW52aXJvbm1lbnQ=}
  expiration-ms: 86400000

sentiguard:
  agent:
    base-url: ${SENTIGUARD_AGENT_BASE_URL:http://127.0.0.1:8000}
    fact-check-path: /internal/v1/fact-check/detail/db
    quick-fact-check-path: /internal/v1/fact-check/quick
    deep-fact-check-path: /internal/v1/fact-check/deep
    collect-path: /internal/v1/collect
    opinion-analyze-path: /internal/v1/opinion/analyze
    internal-token: ${SENTIGUARD_INTERNAL_TOKEN:dev-internal-token}
    connect-timeout-ms: 10000
    read-timeout-ms: 300000
